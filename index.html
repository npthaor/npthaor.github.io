<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Nguyễn Phương Thảo</title>
    <style>
        :root {
            --primary-color: #552744; 
            --bg-color: #f4f3f5; 
            --text-color: #333333;
            --line-color: #552744;
            --hover-color: #7a3861; /* Màu tím nhạt hơn khi hover */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e6e6e6;
            margin: 0;
            padding: 40px 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
        }

        .resume-container {
            width: 100%;
            max-width: 950px;
            background-color: var(--bg-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: row;
            overflow: hidden; /* Để hiệu ứng mượt hơn */
            border-radius: 10px;
        }

        /* --- CỘT TRÁI --- */
        .left-column {
            width: 35%;
            padding: 40px 30px;
            box-sizing: border-box;
            background-color: #f4f3f5;
            border-right: 1px solid #e0e0e0;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid var(--primary-color);
            display: block;
            transition: transform 0.4s ease, box-shadow 0.4s ease; /* Hiệu ứng động cho avatar */
        }

        .avatar:hover {
            transform: scale(1.08) rotate(3deg);
            box-shadow: 0 8px 15px rgba(85, 39, 68, 0.3);
        }

        h1 {
            font-size: 32px;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-info {
            font-size: 14px;
            margin-bottom: 40px;
            color: #444;
        }

        .section-title {
            font-size: 18px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
            font-weight: 800;
            position: relative;
        }

        ul.skills-list {
            list-style-type: disc;
            padding-left: 20px;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        ul.skills-list li {
            margin-bottom: 15px;
            color: #333;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        ul.skills-list li:hover {
            color: var(--hover-color);
            transform: translateX(5px); /* Trượt nhẹ sang phải khi di chuột */
        }
